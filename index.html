// ── Yahoo Finance: all price data in one call per ticker ─────────────────────
// No API key, no rate limit issues, returns 1Y daily data
async function fetchTicker(ticker) {
  try {
    const sym = YF_SYM(ticker);
    const url = "/api/proxy?url=" + encodeURIComponent(
      `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1y`
    );
    const d = await (await fetch(url)).json();
    const result = d?.chart?.result?.[0];
    if (!result) return null;
    const closes = result.indicators?.quote?.[0]?.close;
    const stamps = result.timestamp;
    if (!closes?.length || !stamps?.length) return null;
    // Filter out nulls but keep indices aligned
    const valid = closes.map((c,i) => c != null ? {c, t:stamps[i]} : null).filter(Boolean);
    if (valid.length < 2) return null;
    const n = valid.length;
    const price = valid[n-1].c, prev = valid[n-2].c;
    const now = Date.now()/1000;
    const find = (cutoff) => { let i = valid.findIndex(v => v.t >= cutoff); return i < 0 ? 0 : i; };
    const pct = (i) => valid[i]?.c ? ((price - valid[i].c) / valid[i].c) * 100 : null;
    // Sparkline: downsample to ~80 points
    const step = Math.max(1, Math.floor(n/80));
    const sparkRaw = [];
    for (let i = 0; i < n; i += step) sparkRaw.push(valid[i].c);
    sparkRaw.push(price);
    const sMin = Math.min(...sparkRaw), sMax = Math.max(...sparkRaw);
    const spark = sMax > sMin ? sparkRaw.map(v => (v-sMin)/(sMax-sMin)) : sparkRaw.map(() => 0.5);
    return {
      price, spark,
      dailyPct: prev ? ((price-prev)/prev)*100 : null,
      ytdPct:   pct(find(new Date(new Date().getFullYear(),0,1).getTime()/1000)),
      sixMoPct: pct(find(now - 180*86400)),
      oneyPct:  pct(find(now - 365*86400)),
      fiveyPct: null, // filled by fetch5Y
    };
  } catch(e) { console.error("fetchTicker", ticker, e?.message||e); return null; }
}

// ── Yahoo Finance: 5Y return (monthly data) ──────────────────────────────────
async function fetch5Y(ticker) {
  try {
    const url = "/api/proxy?url=" + encodeURIComponent(
      `https://query1.finance.yahoo.com/v8/finance/chart/${YF_SYM(ticker)}?interval=1mo&range=5y`
    );
    const d = await (await fetch(url)).json();
    const closes = d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(Boolean);
    if (!closes?.length) return null;
    const first = closes[0], last = closes[closes.length-1];
    return first ? ((last-first)/first)*100 : null;
  } catch(e) { return null; }
}

// ── Finnhub: per-ticker fundamentals ─────────────────────────────────────────
async function fetchQuoteDataSingle(ticker) {
  if (ticker === "BTC" || ticker === "ETH") return null;
  var sym = ticker === "BRK/B" ? "BRK.B" : ticker;
  var yfSym = ticker === "BRK/B" ? "BRK-B" : ticker;
  try {
    var mUrl = "/api/proxy?url=" + encodeURIComponent(
      "https://finnhub.io/api/v1/stock/metric?symbol=" + sym + "&metric=all&token=" + FINNHUB_KEY
    );
    var mResp = await fetch(mUrl);
    var mData = await mResp.json();
    var m = mData && mData.metric ? mData.metric : {};

    var t = {};
    try {
      var tUrl = "/api/proxy?url=" + encodeURIComponent(
        "https://query1.finance.yahoo.com/v11/finance/quoteSummary/" + yfSym + "?modules=financialData"
      );
      var tResp = await fetch(tUrl);
      var tRaw = await tResp.text();
      if (["AAPL","MSFT","NVDA"].indexOf(ticker)>=0) console.log("[YF-TARGET] "+ticker+" status:"+tResp.status+" raw:"+tRaw.substring(0,300));
      var tData; try { tData = JSON.parse(tRaw); } catch(e) { tData = null; }
      var fd = tData && tData.quoteSummary && tData.quoteSummary.result && tData.quoteSummary.result[0] && tData.quoteSummary.result[0].financialData;
      if (fd) {
        t.targetMean = fd.targetMeanPrice && fd.targetMeanPrice.raw ? fd.targetMeanPrice.raw : null;
        t.targetHigh = fd.targetHighPrice && fd.targetHighPrice.raw ? fd.targetHighPrice.raw : null;
        t.targetLow  = fd.targetLowPrice && fd.targetLowPrice.raw ? fd.targetLowPrice.raw : null;
        t.analystCount = fd.numberOfAnalystOpinions && fd.numberOfAnalystOpinions.raw ? fd.numberOfAnalystOpinions.raw : null;
      }
    } catch(e) {}

    var pe = m.peBasicExclExtraTTM || m.peTTM || null;
    var fpe = m.peExclExtraAnnual || null;
    var dy = m.dividendYieldIndicatedAnnual || null;
    var eps = m.epsBasicExclExtraTTM || m.epsTTM || null;
    var epsFwd = m.epsEstimateNextYear || null;
    return {
      divYield:    dy,
      trailingPE:  pe,
      forwardPE:   fpe,
      epsTTM:      eps,
      epsFwd:      epsFwd,
      targetMean:  t.targetMean || null,
      targetHigh:  t.targetHigh || null,
      targetLow:   t.targetLow || null,
      analystCount:t.analystCount || null,
    };
  } catch(e) { return null; }
}

async function fetchQuoteData(tickers, onProgress) {
  var results = {};
  var BATCH = 3, DELAY = 7000;
  for (var i = 0; i < tickers.length; i += BATCH) {
    await Promise.allSettled(tickers.slice(i, i + BATCH).map(function(t) {
      return fetchQuoteDataSingle(t).then(function(r) { if (r) results[t] = r; });
    }));
    if (onProgress) onProgress(Object.assign({}, results));
    if (i + BATCH < tickers.length) await new Promise(function(r) { setTimeout(r, DELAY); });
  }
  return results;
}



// ── Correlation Matrix: 3-month rolling correlations between asset classes ────
const CORR_ASSETS = [
  { label:"US Eq",  sym:"SPY" },
  { label:"Cmdty",  sym:"DBC" },
  { label:"Gold",   sym:"GLD" },
  { label:"REITs",  sym:"VNQ" },
  { label:"LT Bond",sym:"TLT" },
  { label:"Intl Bd",sym:"BNDX" },
];
async function fetchCorrelationData(range="6mo") {
  try {
    const dailyReturns = {};
    await Promise.all(CORR_ASSETS.map(async ({label, sym}) => {
      const url = "/api/proxy?url=" + encodeURIComponent(
        `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1y`
      );
      const d = await (await fetch(url)).json();
      const closes = d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
      if (!closes) return;
      const ret = [];
      for (let i=1;i<closes.length;i++) {
        if (closes[i]!=null && closes[i-1]!=null && closes[i-1]!==0)
          ret.push((closes[i]-closes[i-1])/closes[i-1]);
      }
      dailyReturns[label] = ret;
    }));
    const labels = CORR_ASSETS.map(a=>a.label).filter(l=>dailyReturns[l]?.length>10);
    // Slice to window: ~21 trading days/month
    const windowDays = {["1mo"]:21, ["3mo"]:63, ["6mo"]:126, ["1y"]:252}[range] || 126;
    labels.forEach(l => { dailyReturns[l] = dailyReturns[l].slice(-windowDays); });
    const minLen = Math.min(...labels.map(l=>dailyReturns[l].length));
    labels.forEach(l => { dailyReturns[l] = dailyReturns[l].slice(-minLen); });
    const corr = {};
    labels.forEach(a => { corr[a] = {}; labels.forEach(b => {
      if (a===b) { corr[a][b]=1; return; }
      const ra=dailyReturns[a], rb=dailyReturns[b], n=Math.min(ra.length,rb.length);
      const ma=ra.reduce((s,v)=>s+v,0)/n, mb=rb.reduce((s,v)=>s+v,0)/n;
      let cv=0, va=0, vb=0;
      for(let i=0;i<n;i++){ const da=ra[i]-ma,db=rb[i]-mb; cv+=da*db; va+=da*da; vb+=db*db; }
      corr[a][b] = (va>0&&vb>0) ? cv/Math.sqrt(va*vb) : 0;
    });});
    return { labels, corr, range, tradingDays: minLen };
  } catch(e) { console.error("Corr err",e); return null; }
}

// ── FRED: generic series fetch (desc, most recent first) ──────────────────────
async function fredSeries(id, limit=5) {
  try {
    const url="/api/proxy?url=" + encodeURIComponent(`https://api.stlouisfed.org/fred/series/observations?series_id=${id}&api_key=${FRED_KEY}&sort_order=desc&limit=${limit}&file_type=json`);
    const d=await (await fetch(url)).json();
    return (d.observations||[]).filter(o=>o.value!==".").map(o=>parseFloat(o.value));
  } catch(e) { return []; }
}

// ── FRED: yield curve ─────────────────────────────────────────────────────────
async function fetchYieldCurve() {
  const SERIES={"3M":"DGS3MO","1Y":"DGS1","2Y":"DGS2","3Y":"DGS3","5Y":"DGS5","7Y":"DGS7","10Y":"DGS10","30Y":"DGS30"};
  const results={};
  await Promise.all(Object.entries(SERIES).map(async ([label,id])=>{
    const v=await fredSeries(id,3);
    results[label]={ cur:v[0]??null, prev:v[1]??null };

}

// ── FRED: macro regime data ───────────────────────────────────────────────────
async function fetchMacroData() {
  const [be,indpro,ff,cpi,m2,lei,ig,hy]=await Promise.all([
    fredSeries("T10YIE",35),       // 10Y breakeven inflation, daily
    fredSeries("INDPRO",6),        // industrial production
    fredSeries("FEDFUNDS",2),      // fed funds rate
    fredSeries("CPIAUCSL",14),     // CPI index 14mo for YoY
    fredSeries("M2SL",14),         // M2 money supply 14mo
    fredSeries("USSLIND",7),       // Leading Economic Index
    fredSeries("BAMLC0A0CM",2),    // IG credit OAS spread
    fredSeries("BAMLH0A0HYM2",2),  // HY credit OAS spread
  ]);
  // China/EU PMI and Buffett Indicator removed — no reliable free data source
  const inflationRising = be.length>=30 ? be[0]>be[29] : null;
  const growthRising    = indpro.length>=4 ? indpro[0]>indpro[3] : null;
  const regime = (inflationRising===null||growthRising===null) ? null
    : ( inflationRising&& growthRising) ? "Reflation"
    : ( inflationRising&&!growthRising) ? "Stagflation"
    : (!inflationRising&& growthRising) ? "Goldilocks"
    : "Deflation";
  const cpiYoY = cpi.length>=13 ? ((cpi[0]/cpi[12])-1)*100 : null;
  const m2YoY  = m2.length>=13  ? ((m2[0]/m2[12])-1)*100  : null;
  const m2Prev = m2.length>=14  ? ((m2[1]/m2[13])-1)*100  : null;
  const realFF = (ff[0]!=null&&cpiYoY!=null) ? ff[0]-cpiYoY : null;
  const leiChg = lei.length>=7 ? lei[0]-lei[6] : null;
  return {
    regime, inflationRising, growthRising,
    fedFunds:ff[0]??null, fedFundsPrev:ff[1]??null, breakeven:be[0]??null,
    cpiYoY, realFF,
    m2YoY, m2Prev,
    leiLatest:lei[0]??null, leiChg,
    igSpread:ig[0]??null, igPrev:ig[1]??null,
    hySpread:hy[0]??null, hyPrev:hy[1]??null,
  };
}

// ── YieldCurve component ───────────────────────────────────────────────────────
function YieldCurve({ yields }) {
  const NODES=[["3M",8],["1Y",30],["2Y",52],["3Y",72],["5Y",96],["7Y",123],["10Y",153],["30Y",195]];
  const vals=NODES.map(([k])=>yields[k]?.cur).filter(v=>v!=null);
  const sans="'DM Sans','Segoe UI',sans-serif";
  if (vals.length<2) return <span style={{color:"#2e4560",fontSize:"11px"}}>Loading…</span>;
  const H=50,W=210,pad=4;
  const mn=Math.min(...vals)-0.05, mx=Math.max(...vals)+0.05;
  const toY=v=>H-((v-mn)/(mx-mn))*(H-pad*2)-pad;
  const pathD=NODES.map(([k,x],i)=>{ const v=yields[k]?.cur; if(v==null)return null; return `${i===0?"M":"L"}${x},${toY(v).toFixed(1)}`; }).filter(Boolean).join(" ");
  const [twoY,tenY,threeM]=[yields["2Y"]?.cur,yields["10Y"]?.cur,yields["3M"]?.cur];
  const s2s10=(twoY&&tenY)?tenY-twoY:null;
  const s3m10=(threeM&&tenY)?tenY-threeM:null;
  const shape=s2s10===null?"—":s2s10>0.5?"Normal ▲":s2s10<-0.1?"Inverted ▼":"Flat →";
  const shapeColor=s2s10===null?"#4a6278":s2s10>0.5?"#22c55e":s2s10<-0.1?"#ef4444":"#f59e0b";
  return (
    <div style={{display:"flex",alignItems:"center",gap:"16px",flexWrap:"wrap"}}>
      <svg width={W+20} height={H+20} style={{overflow:"visible"}}>
        <path d={pathD} fill="none" stroke="#38bdf8" strokeWidth="1.5"/>
        {NODES.map(([k,x])=>{
          const v=yields[k]?.cur; if(v==null)return null;
          const prev=yields[k]?.prev; const chg=prev!=null?v-prev:0;
          return (
            <g key={k}>
              <circle cx={x} cy={toY(v)} r="2.5" fill="#38bdf8"/>
              <text x={x} y={H+14} textAnchor="middle" fill="#4a6278" fontSize="8" fontFamily={S.sans}>{k}</text>
              <text x={x} y={toY(v)-6} textAnchor="middle" fill="#94a3b8" fontSize="7.5" fontFamily={S.sans}>{v.toFixed(2)}</text>
              {Math.abs(chg)>0.001&&<text x={x} y={toY(v)-15} textAnchor="middle" fill={chg>0?"#ef4444":"#22c55e"} fontSize="7" fontFamily={S.sans}>{chg>0?"+":""}{chg.toFixed(2)}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
        <div>
          <div style={{fontSize:"9px",color:"#4a6278",letterSpacing:"0.06em",fontFamily:S.sans}}>CURVE SHAPE</div>
          <div style={{fontSize:"13px",fontWeight:700,color:shapeColor,fontFamily:S.sans}}>{shape}</div>
        </div>
        {s2s10!==null&&<div style={{fontSize:"10px",color:"#4a6278",fontFamily:S.sans}}>2s/10s: <span style={{color:s2s10<0?"#ef4444":"#94a3b8"}}>{s2s10>=0?"+":""}{s2s10.toFixed(2)}%</span></div>}
        {s3m10!==null&&<div style={{fontSize:"10px",color:"#4a6278",fontFamily:S.sans}}>3m/10y: <span style={{color:s3m10<0?"#ef4444":"#94a3b8"}}>{s3m10>=0?"+":""}{s3m10.toFixed(2)}%</span></div>}
        <div style={{fontSize:"8px",color:"#4a6278",fontFamily:S.sans,marginTop:"4px",cursor:"help"}} title={"Green dots (3M, 5Y, 10Y, 30Y) update real-time via Yahoo Finance.\nBlue dots (1Y, 2Y, 3Y, 7Y) update daily ~6PM ET via FRED."}>
          <span style={{color:"#22c55e"}}>{"●"}</span> Real-time{"  "}<span style={{color:"#38bdf8"}}>{"●"}</span> Daily ~6PM ET
        </div>
      </div>
    </div>
  );
}

  if (cur==null||prev==null) return "";
  return cur > prev ? " ↑" : cur < prev ? " ↓" : " →";
}
function signal(val, goodAbove, warnAbove) {
  // Returns color: green / yellow / red
  if (val==null) return S.dim;
  if (goodAbove!=null && val>=goodAbove) return S.grn;
  if (warnAbove!=null && val>=warnAbove) return "#f59e0b";
  return S.red;
}

// ── Correlation Matrix Heatmap ───────────────────────────────────────────────
function CorrelationMatrix({ corrData, onRangeChange }) {
  if (!corrData) return null;
  const { labels, corr, range, tradingDays } = corrData;
  if (!labels?.length) return null;
  const cellSize = 52, labelW = 60, fontSize = 10;
  const ranges = ["1mo","3mo","6mo","1y"];
  const rangeLabels = {["1mo"]:"1M", ["3mo"]:"3M", ["6mo"]:"6M", ["1y"]:"1Y"};
  // Stress check: count pairs with |corr| > 0.8
  let highCorrPairs = 0;
  labels.forEach((a,i) => { labels.forEach((b,j) => {
    if (j>i && Math.abs(corr[a]?.[b]||0) > 0.8) highCorrPairs++;
  });});
  const corrColor = (v) => {
    if (v >= 0.7)  return "#22c55e";
    if (v >= 0.3)  return "#22c55e88";
    if (v > -0.3)  return "#94a3b8";
    if (v > -0.7)  return "#ef444488";
    return "#ef4444";
  };
  const corrBg = (v) => {
    if (v >= 0.7)  return "#22c55e18";
    if (v >= 0.3)  return "#22c55e0a";
    if (v > -0.3)  return "transparent";
    if (v > -0.7)  return "#ef44440a";
    return "#ef444418";
  };
  return (
    <div style={{ background:S.bg1, border:`1px solid ${S.bdr2}`, padding:"18px 20px", marginBottom:"20px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"14px", flexWrap:"wrap", gap:"10px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
          <span style={{ fontSize:"9px", color:S.dim, letterSpacing:"0.1em", fontFamily:S.sans }}>ASSET CLASS CORRELATIONS</span>
          {highCorrPairs > 0 && <span style={{ fontSize:"9px", color:"#f59e0b", fontFamily:S.sans, background:"#f59e0b18", padding:"2px 8px", border:"1px solid #f59e0b45" }}>⚠ {highCorrPairs} pair{highCorrPairs>1?"s":""} &gt;0.8</span>}
        </div>
        <div style={{ display:"flex", gap:"2px" }}>
          {ranges.map(r => <button key={r} onClick={() => onRangeChange(r)} style={{ background: r===range ? S.acc+"22" : S.bg2, border:`1px solid ${r===range ? S.acc : S.bdr2}`, color: r===range ? S.acc : S.dim, padding:"4px 10px", fontSize:"10px", fontFamily:S.sans, cursor:"pointer", fontWeight: r===range ? 700 : 400 }}>{rangeLabels[r]}</button>)}
        </div>
      </div>
      <div style={{ overflowX:"auto" }}>
        <table style={{ borderCollapse:"collapse", fontFamily:S.sans }}>
          <thead>
            <tr>
              <th style={{ width:labelW, padding:"4px" }}></th>
              {labels.map(l => (
                <th key={l} style={{ width:cellSize, padding:"4px", fontSize:"8px", color:S.dim, fontWeight:600, textAlign:"center", letterSpacing:"0.04em" }}>{l}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {labels.map(row => (
              <tr key={row}>
                <td style={{ fontSize:"8px", color:S.dim, fontWeight:600, padding:"4px 8px 4px 0", textAlign:"right", letterSpacing:"0.04em" }}>{row}</td>
                {labels.map(col => {
                  const v = corr[row]?.[col] ?? 0;
                  const isDiag = row === col;
                  return (
                    <td key={col} style={{ width:cellSize, height:36, textAlign:"center", fontSize:fontSize, fontWeight:isDiag?400:600, color: isDiag ? S.dim2 : corrColor(v), background: isDiag ? S.bg2 : corrBg(v), border:`1px solid ${S.bdr2}`, padding:"4px" }}>
                      {isDiag ? "—" : (v>=0?"+":"")+v.toFixed(2)}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ fontSize:"9px", color:S.dim2, fontFamily:S.sans, marginTop:"10px" }}>
        <span style={{ color:"#22c55e" }}>Green</span> = correlated · <span style={{ color:"#94a3b8" }}>Gray</span> = uncorrelated · <span style={{ color:"#ef4444" }}>Red</span> = negatively correlated · {tradingDays} trading days · SPY/DBC/GLD/VNQ/TLT/BNDX
      </div>
    </div>
  );
}

// ── CSV export ───────────────────────────────────────────────────────────────
function exportCSV(stocks) {
  const rows = [["Ticker","Name","Tags","Thesis","Entry Low","Entry High","Account"]];
  stocks.forEach(s => {
    const t = THESIS[s.ticker] || {};
    rows.push([
      s.ticker,
      `"${s.name}"`,
      `"${s.tags.join(", ")}"`,
      `"${(t.t || "").replace(/"/g, "'")}"`,
      t.e ? t.e[0] : "",
      t.e ? t.e[1] : "",
      t.a ? ACCT[t.a] : "",
    ]);
  });
  const csv = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "portfolio-watchlist.csv"; a.click();
  URL.revokeObjectURL(url);
}


// ── Row Sparkline ─────────────────────────────────────────────────────────────
function Spark({ points, pct }) {
  if (!points || points.length < 2) return <span style={{color:"#2e4560",fontSize:"9px"}}>—</span>;
  const W = 80, H = 28;
  const xs = points.map((_, i) => (i / (points.length - 1)) * W);
  const ys = points.map(v => H - v * (H - 2) - 1);
  const d  = xs.map((x, i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const color = pct == null ? "#38bdf8" : pct >= 0 ? "#22c55e" : "#ef4444";
  // Fill area under curve
  const fill = d + ` L${W},${H} L0,${H} Z`;
  return (
    <svg width={W} height={H} style={{display:"block",overflow:"visible"}}>
      <defs>
        <linearGradient id={`sg${Math.round((pct||0)*10)}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill={`url(#sg${Math.round((pct||0)*10)})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.2"/>
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="2" fill={color}/>
    </svg>
  );
}

function StockTracker() {
  const [activeFilters, setActiveFilters] = useState(new Set());

  const [search,        setSearch]        = useState("");
  const [sortBy,        setSortBy]        = useState("ticker");

  const [expandedRow,   setExpandedRow]   = useState(null);

  const [valPref, setValPref] = useState(new Set(["trailingPE","fwdPE","target","upside"]));

  const [realReturns,   setRealReturns]   = useState(false); // subtract CPI from returns
  const [corrData,      setCorrData]      = useState(null);
  const [quoteData,     setQuoteData]     = useState({});
  const [darkMode,      setDarkMode]      = useState(false);
  const [priceData,     setPriceData]     = useState({});
  const [yields,        setYields]        = useState({});
  const [macro,         setMacro]         = useState({});
  const [loading,       setLoading]       = useState(false);
  const [progress,      setProgress]      = useState(0);
  const [lastUpdated,   setLastUpdated]   = useState(null);
  const [apiStatus,     setApiStatus]     = useState(null); // {yahoo:"ok"|"err:...", fred:"ok"|"err:..."}
  const [livePrice,     setLivePrice]     = useState({});   // {ticker: {price, time}}
  const [wsStatus,      setWsStatus]      = useState("off"); // off|connecting|live|error

  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap";
    document.head.appendChild(link);
  }, []);

  // ── Cache helpers ──────────────────────────────────────────────────────────
  const CACHE_KEY = "awpt_cache_v1";
  const saveCache = (prices, yld, mac) => {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), prices, yields: yld, macro: mac })); } catch(e) {}
  };
  const loadCache = () => {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const c = JSON.parse(raw);
      // Cache valid for 24 hours
      if (Date.now() - c.ts > 24 * 60 * 60 * 1000) return null;
      return c;
    } catch(e) { return null; }
  };

  // ── Restore cache instantly on mount ─────────────────────────────────────
  useEffect(() => {
    const c = loadCache();
    if (c) {
      if (c.prices) { setPriceData(c.prices); setProgress(STOCKS.length); }
      if (c.yields) setYields(c.yields);
      if (c.macro)  setMacro(c.macro);
      if (c.ts)     setLastUpdated(new Date(c.ts));
    }
    // ── API diagnostic: test one call from each API ──
    (async () => {
      const status = { yahoo: "testing…", fred: "testing…" };
      setApiStatus({...status});
      try {
        const yfUrl = "/api/proxy?url=" + encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/AAPL?interval=1d&range=5d");
        const yfRes = await fetch(yfUrl);
        const yfData = await yfRes.json();
        status.yahoo = yfRes.ok && yfData?.chart?.result?.[0] ? "ok" : `err: ${yfRes.status} ${JSON.stringify(yfData).slice(0,80)}`;
      } catch(e) { status.yahoo = `err: ${e.message}`; }
      try {
        const frUrl = "/api/proxy?url=" + encodeURIComponent(`https://api.stlouisfed.org/fred/series/observations?series_id=DGS10&api_key=${FRED_KEY}&sort_order=desc&limit=1&file_type=json`);
        const frRes = await fetch(frUrl);
        const frData = await frRes.json();
        status.fred = frRes.ok && frData.observations?.length ? "ok" : `err: ${frRes.status} ${JSON.stringify(frData).slice(0,80)}`;
      } catch(e) { status.fred = `err: ${e.message}`; }
      setApiStatus(status);
    })();
  }, []);

  // ── Finnhub WebSocket: real-time price stream ──────────────────────────────
  useEffect(() => {
    let ws = null;
    let reconnectTimer = null;
    const liveBuf = {}; // buffer to batch state updates

    function connect() {
      setWsStatus("connecting");
      ws = new WebSocket(`wss://ws.finnhub.io?token=${FINNHUB_KEY}`);

      ws.onopen = () => {
        setWsStatus("live");
        // Subscribe to all tickers
        STOCKS.forEach(s => {
          ws.send(JSON.stringify({ type: "subscribe", symbol: FH_SYM(s.ticker) }));
        });
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type !== "trade" || !msg.data?.length) return;
          // Process trades — take latest price per symbol
          msg.data.forEach(trade => {
            const ticker = FH_REVERSE[trade.s];
            if (ticker) {
              liveBuf[ticker] = { price: trade.p, time: trade.t };
            }
          });
        } catch(e) {}
      };

      ws.onerror = () => setWsStatus("error");
      ws.onclose = () => {
        setWsStatus("off");
        // Reconnect after 5s
        reconnectTimer = setTimeout(connect, 5000);
      };
    }

    connect();

    // Flush live buffer to state every 2 seconds (avoids thrashing on fast streams)
    const flushInterval = setInterval(() => {
      const keys = Object.keys(liveBuf);
      if (keys.length > 0) {
        setLivePrice(prev => ({ ...prev, ...liveBuf }));
      }
    }, 2000);

    return () => {
      if (ws) { ws.onclose = null; ws.close(); }
      if (reconnectTimer) clearTimeout(reconnectTimer);
      clearInterval(flushInterval);
    };
  }, []);

  const loadAll = useCallback(async () => {
    setLoading(true);
    setProgress(prev => prev || 0);
    // FRED fires independently — different API, no Finnhub rate impact
    let freshYields = null, freshMacro = null;
    fetchYieldCurve().then(function(v) { if (v) { setYields(v); freshYields = v; } }).catch(function(){});
    fetchMacroData().then(v  => { if (v) { setMacro(v);  freshMacro  = v; } }).catch(()=>{});
    fetchCorrelationData("6mo").then(v => { if (v) setCorrData(v); }).catch(()=>{});
    // Yahoo Finance: no strict rate limit — fire in batches of 20 with short pauses
    const tickers = STOCKS.map(s => s.ticker);
    const BATCH=20, DELAY=2000;
    const all={};
    for (let i=0; i<tickers.length; i+=BATCH) {
      await Promise.allSettled(tickers.slice(i,i+BATCH).map(async t => {
        try { const r=await fetchTicker(t); if (r) all[t]=r; } catch(e) {}
      }));
      setPriceData(prev => ({...prev, ...all}));
      setProgress(Math.min(i+BATCH, tickers.length));
      if (i+BATCH < tickers.length) await new Promise(r => setTimeout(r, DELAY));
    }
    // 5Y returns via Yahoo Finance (runs in parallel after main load)
    Promise.allSettled(Object.keys(all).map(async t => {
      const pct = await fetch5Y(t);
      if (pct!=null) all[t] = {...all[t], fiveyPct:pct};
    })).then(() => {
      setPriceData(prev => ({...prev, ...all}));
      // Save everything to cache
      saveCache(all, freshYields, freshMacro);
    });
    // Dividend yields via Yahoo quote endpoint
    fetchQuoteData(tickers, (partial) => setQuoteData(partial)).then(qd => { if (qd) setQuoteData(qd); }).catch(()=>{});
    setLastUpdated(new Date());
    setLoading(false);
  }, []);

  useEffect(() => {
    loadAll();
    const interval = setInterval(loadAll, 5 * 60 * 1000); // refresh every 5 min
    return () => clearInterval(interval);
  }, []);



  const toggleFilter     = (tag) => setActiveFilters(prev => { const n = new Set(prev); n.has(tag) ? n.delete(tag) : n.add(tag); return n; });
  const toggleBucketOpen = (id)  => setOpenBuckets(prev   => { const n = new Set(prev); n.has(id)  ? n.delete(id)  : n.add(id);  return n; });
  const toggleRow        = (t)   => setExpandedRow(v => v === t ? null : t);

  const getBucketState = (bucket) => {
    const active = bucket.tags.filter(t => activeFilters.has(t));
    if (active.length === 0) return "none";
    if (active.length === bucket.tags.length) return "all";
    return "partial";
  };

  const toggleBucketCheck = (bucket) => {
    const state = getBucketState(bucket);
    setActiveFilters(prev => {
      const n = new Set(prev);
      if (state === "all") bucket.tags.forEach(t => n.delete(t));
      else                 bucket.tags.forEach(t => n.add(t));
      return n;
    });
  };

  const handleSort = (col) => {
    if (sortBy === col) setSortDir(d => -d);
    else { setSortBy(col); setSortDir(1); }
  };

  S = darkMode ? DARK : LIGHT;
  if (typeof document !== "undefined") document.body.style.background = S.bg;

  const filtered = useMemo(() => {
    let list = STOCKS;
    if (activeFilters.size > 0) list = list.filter(s => s.tags.some(t => activeFilters.has(t)));
    if (inSeasonOnly && macro?.regime) list = list.filter(s => isInSeason(s.tags, macro.regime));
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(s =>
        s.ticker.toLowerCase().includes(q) ||
        s.name.toLowerCase().includes(q) ||
        s.tags.some(t => t.toLowerCase().includes(q))
      );
    }
    return [...list].sort((a, b) => {
      if (sortBy === "ticker") return sortDir * a.ticker.localeCompare(b.ticker);
      if (sortBy === "name")   return sortDir * a.name.localeCompare(b.name);
      if (sortBy === "acct") {
        const aAcct = getAc(a.ticker), bAcct = getAc(b.ticker);
        return sortDir * aAcct.localeCompare(bAcct);
      }
      // Numeric columns: use priceData + livePrice
      const getVal = (ticker, field) => {
        const pd = priceData[ticker];
        const live = livePrice[ticker];
        if (field === "price" && live?.price) return live.price;
        if (field === "divYield") return quoteData[ticker]?.divYield ?? null;
        if (field === "trailingPE") return quoteData[ticker]?.trailingPE ?? null;
        if (field === "fwdPE") return quoteData[ticker]?.forwardPE ?? null;
        if (field === "target") return quoteData[ticker]?.targetMean ?? null;
        if (field === "upside") { const tgt=quoteData[ticker]?.targetMean, p=livePrice[ticker]?.price||priceData[ticker]?.price; return (tgt&&p)?((tgt-p)/p)*100:null; }
        return pd?.[field] ?? null;
      };
      const av = getVal(a.ticker, sortBy), bv = getVal(b.ticker, sortBy);
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      return sortDir * (av - bv);
    });
  }, [activeFilters, inSeasonOnly, macro, search, sortBy, sortDir, priceData, livePrice, quoteData]);

          <p style={{ fontSize:"11px", color:S.dim, margin:"5px 0 0" }}>
            All-Weather Portfolio Watchlist

          <button
            onClick={() => setInSeasonOnly(v => !v)}
            style={{ background: inSeasonOnly ? REGIME_COLOR[macro.regime]+"28" : S.bg2, border: `1px solid ${inSeasonOnly ? REGIME_COLOR[macro.regime] : S.bdr}`, color: inSeasonOnly ? REGIME_COLOR[macro.regime] : S.dim, padding:"8px 14px", fontSize:"12px", fontFamily:S.sans, cursor:"pointer", transition:"all 0.15s", }}
          >
            ★ In Season ({macro.regime})
          </button>
        )}

        {/* Export */}
        <button
          onClick={() => exportCSV(filtered)}
          style={{ background:S.bg2, border:"1px solid "+S.bdr, color:S.dim, padding:"8px 14px", fontSize:"12px", fontFamily:S.sans, cursor:"pointer" }}
        >
          Export CSV
        </button>

        {/* Column Group Dropdowns */}
        {[
          { id:"core", label:"Core Data", items:[["ticker","Ticker"],["name","Name"],["price","Price"],["divYield","Div Yield"],["spark","1Y Chart"],["tags","Tags"],["acct","Account"]] },
          { id:"returns", label:"Returns", items:[["dailyPct","1D %"],["ytdPct","YTD %"],["sixMoPct","6M %"],["oneyPct","1Y %"],["fiveyPct","5Y %"]] },
          { id:"valuation", label:"Valuation", items:[["trailingPE","P/E"],["fwdPE","Fwd P/E"],["target","Target"],["upside","Upside"]] },
        ].map(function(group) {
          var isOpen = openDropdown === group.id;
          var anyOn = group.items.some(function(arr) { return visibleCols.has(arr[0]); });
          return (
            <div key={group.id} style={{ position:"relative", display:"inline-block" }}>
              <button
                onClick={function() { setOpenDropdown(function(prev) { return prev === group.id ? null : group.id; }); }}
                style={{ background: isOpen ? S.bg3 : anyOn ? S.acc+"18" : S.bg2, border:"1px solid "+(isOpen ? S.acc : anyOn ? S.acc : S.bdr), color: isOpen ? S.acc : anyOn ? S.acc : S.dim, padding:"6px 12px", fontSize:"11px", fontFamily:S.sans, cursor:"pointer" }}
              >
                {group.label} {isOpen ? "\u25b4" : "\u25be"}
              </button>
              {isOpen && (
                <div style={{ position:"absolute", top:"100%", left:0, marginTop:"4px", background:S.bg1, border:"1px solid "+S.bdr, padding:"6px 0", zIndex:50, minWidth:"150px" }}>
                  {group.items.map(function(arr) {
                    var k=arr[0], label=arr[1];
                    var isOn = visibleCols.has(k);
                    return (
                      <label key={k} style={{ display:"flex", alignItems:"center", gap:"8px", padding:"4px 14px", fontSize:"11px", color: isOn ? S.txt : S.dim2, cursor:"pointer", fontFamily:S.sans }}
                        onClick={function() {
                          setVisibleCols(function(prev) { var n=new Set(prev); n.has(k)?n.delete(k):n.add(k); return n; });
                          if (group.id==="returns") { setReturnsPref(function(prev) { var n=new Set(prev); n.has(k)?n.delete(k):n.add(k); return n; }); }
                          if (group.id==="valuation") { setValPref(function(prev) { var n=new Set(prev); n.has(k)?n.delete(k):n.add(k); return n; }); }
                        }}
                      >
                        <span style={{ width:13, height:13, border:"1px solid "+S.bdr, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:"9px", background: isOn ? S.acc+"22" : "transparent", color: isOn ? S.acc : "transparent" }}>✓</span>
                        {label}
                      </label>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}

        {/* Real Return Toggle */}
        <button
          onClick={function() { setRealReturns(function(v) { return !v; }); }}
          style={{ background: realReturns ? "#22c55e22" : S.bg2, border:"1px solid "+(realReturns ? S.grn : S.bdr), color: realReturns ? S.grn : S.dim, padding:"8px 14px", fontSize:"12px", fontFamily:S.sans, cursor:"pointer", transition:"all 0.15s" }}
        >
          {realReturns ? "Real Returns (−CPI)" : "Nominal Returns"}
        </button>

        <span style={{ fontSize:"12px", color:S.dim }}>
          {filtered.length} of {STOCKS.length} shown
        </span>
      </div>

      {/* ── Bucket Accordions ── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(310px, 1fr))", gap:"6px", marginBottom:"28px" }}>
        {BUCKETS.map(bucket => {
          const isOpen     = openBuckets.has(bucket.id);
          const state      = getBucketState(bucket);
          const accentColor = TAG_COLORS[bucket.tags[0]] || S.dim;
          const isActive   = state !== "none";

          return (
            <div key={bucket.id} style={{ background:S.bg1, border:`1px solid ${isActive ? accentColor+"60" : S.bdr2}`, transition:"border-color 0.2s" }}>

              {/* Header row */}
              <div style={{ display:"flex", alignItems:"center", padding:"9px 12px", gap:"9px" }}>

                {/* Checkbox */}
                <div
                  onClick={() => toggleBucketCheck(bucket)}
                  title="Select / deselect all tags"
                  style={{ width:"15px", height:"15px", flexShrink:0, cursor:"pointer", border:"1.5px solid "+(isActive ? accentColor : S.dim2), background: state === "all" ? accentColor : state === "partial" ? accentColor+"33" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.15s", }}
                >
                  {state === "all" && <svg width="9" height="9" viewBox="0 0 9 9"><path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  {state === "partial" && <div style={{ width:"7px", height:"1.5px", background:accentColor }} />}
                </div>

                {/* Label */}
                <div onClick={() => toggleBucketOpen(bucket.id)} style={{ flex:1, display:"flex", alignItems:"center", gap:"7px", cursor:"pointer", userSelect:"none", minWidth:0 }}>
                  <span style={{ fontSize:"14px", flexShrink:0 }}>{bucket.emoji}</span>
                  <span style={{ fontSize:"12px", fontWeight:600, color: isActive ? "#dde6f0" : S.txt2, transition:"color 0.15s", whiteSpace:"nowrap" }}>
                    {bucket.label}
                  </span>
                  {(() => {
                    const sel = bucket.tags.filter(t => activeFilters.has(t)).length;
                    const tot = bucket.tags.reduce((n,t) => n + STOCKS.filter(s=>s.tags.includes(t)).length, 0);
                    const uniq = [...new Set(STOCKS.filter(s=>s.tags.some(t=>bucket.tags.includes(t))).map(s=>s.ticker))].length;
                    return (
                      <span style={{ fontSize:"10px", color: sel>0 ? S.acc : S.dim2, marginLeft:"auto", paddingLeft:"8px", flexShrink:0, fontFamily:S.sans }}>
                        {sel>0 ? `${bucket.tags.filter(t=>activeFilters.has(t)).length} filter${sel>1?"s":""} · ` : ""}{uniq}
                      </span>
                    );
                  })()}
                </div>

                {/* Triangle */}
                <div
                  onClick={() => toggleBucketOpen(bucket.id)}
                  style={{ cursor:"pointer", color: isOpen ? "#4a7090" : S.dim2, fontSize:"9px", transform: isOpen ? "rotate(180deg)" : "rotate(0deg)", transition:"transform 0.2s, color 0.15s", paddingLeft:"4px", flexShrink:0 }}
                >▼</div>
              </div>

              {/* Sub-tags */}
              {isOpen && (
                <div style={{ padding:"2px 12px 10px 36px", display:"flex", flexWrap:"wrap", gap:"5px" }}>
                  {bucket.tags.map(tag => {
                    const active = activeFilters.has(tag);
                    const color  = TAG_COLORS[tag] || "#6b7280";
                    const count  = STOCKS.filter(s => s.tags.includes(tag)).length;
                    return (
                      <button
                        key={tag}
                        onClick={() => toggleFilter(tag)}
                        style={{ background: active ? color : `${color}15`, border:`1px solid ${active ? color : color+"40"}`, color: active ? "#fff" : color, padding:"3px 9px", fontSize:"11px", fontFamily:S.sans, cursor:"pointer", transition:"all 0.12s", whiteSpace:"nowrap", }}
                      >
                        {tag} <span style={{ opacity:0.5, fontSize:"9px", marginLeft:"3px" }}>{count}</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── Table ── */}
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:"12px" }}>
        <thead>
          <tr style={{ background:S.bg1 }}>
            {[["ticker","Ticker"],["name","Name"]].filter(([k])=>visibleCols.has(k)).map(([col, label]) => (
              <th key={col} onClick={() => handleSort(col)} style={{ textAlign:"left", padding:"10px 14px", fontSize:"11px", color: sortBy === col ? S.acc : S.dim, fontWeight:600, cursor:"pointer", userSelect:"none", borderBottom:"1px solid "+S.bdr, whiteSpace:"nowrap", fontFamily:S.sans, }}>
                {label} {sortBy === col ? (sortDir === 1 ? "↑" : "↓") : ""}
              </th>
            ))}
            {[["price","Price"],["dailyPct","1D %"],["ytdPct","YTD %"],["sixMoPct","6M %"],["oneyPct","1Y %"],["fiveyPct","5Y %"],["divYield","Div %"],["trailingPE","P/E"],["fwdPE","Fwd P/E"],["target","Target"],["upside","Upside"]].filter(([k])=>visibleCols.has(k)).map(([col, label]) => (
              <th key={col} onClick={() => handleSort(col)} style={{ textAlign:"right", padding:"10px 14px", fontSize:"11px", color: sortBy === col ? S.acc : S.dim, fontWeight:600, cursor:"pointer", userSelect:"none", borderBottom:"1px solid "+S.bdr, fontFamily:S.sans, whiteSpace:"nowrap" }}>
                {label} {sortBy === col ? (sortDir === 1 ? "↑" : "↓") : ""}
              </th>
            ))}
            {visibleCols.has("spark") && <th style={{ textAlign:"left", padding:"6px 14px", fontSize:"11px", color:S.dim, fontWeight:600, borderBottom:"1px solid "+S.bdr, fontFamily:S.sans, whiteSpace:"nowrap" }}>1Y Chart</th>}
            {visibleCols.has("tags") && <th style={{ textAlign:"left", padding:"10px 14px", fontSize:"11px", color:S.dim, fontWeight:600, borderBottom:"1px solid "+S.bdr, fontFamily:S.sans }}>Tags</th>}
            {visibleCols.has("acct") && <th onClick={() => handleSort("acct")} style={{ textAlign:"left", padding:"10px 14px", fontSize:"11px", color: sortBy === "acct" ? S.acc : S.dim, fontWeight:600, cursor:"pointer", userSelect:"none", borderBottom:"1px solid "+S.bdr, fontFamily:S.sans }}>
              Ideal Account {sortBy === "acct" ? (sortDir === 1 ? "↑" : "↓") : ""}
            </th>}
          </tr>
        </thead>
        <tbody>
          {filtered.map((stock, i) => {
            const _th = stock.ticker;
            const isOpen  = expandedRow === stock.ticker;
            const acctKey = getAc(_th);
            const acctLabel = ACCT[acctKey];
            const acctColor = ACCT_COLOR[acctKey];

            return (
              <>
                <tr
                  key={stock.ticker}
                  onClick={() => toggleRow(stock.ticker)}
                  style={{ borderBottom: isOpen ? "none" : "1px solid "+S.bg2, background: isOpen ? S.bg3 : i % 2 === 0 ? S.bg1 : S.bg, cursor:"pointer", }}
                  onMouseEnter={e => { if (!isOpen) e.currentTarget.style.background = S.bg3; }}
                  onMouseLeave={e => { if (!isOpen) e.currentTarget.style.background = i % 2 === 0 ? S.bg1 : S.bg; }}
                >
                  {visibleCols.has("ticker") && <td style={{ padding:"10px 14px", fontWeight:600, color:S.acc, whiteSpace:"nowrap", fontSize:"13px", fontFamily:S.sans }}>
                    <span style={{ marginRight:"6px", fontSize:"9px", color: isOpen ? S.acc : S.dim2, transition:"color 0.15s" }}>▶</span>
                    {stock.ticker}
                    {isInSeason(stock.tags, macro?.regime) && (
                      <span title={`Favored in ${macro.regime}`} style={{ marginLeft:"5px", fontSize:"9px", color: REGIME_COLOR[macro.regime], verticalAlign:"middle", lineHeight:1 }}>★</span>
                    )}
                  </td>}
                  {visibleCols.has("name") && <td style={{ padding:"10px 14px", color:S.txt2, fontSize:"12px", fontFamily:S.sans, whiteSpace:"nowrap" }}>
                    {stock.name}
                  </td>}
                  {/* Price + return columns */}
                  {["price","dailyPct","ytdPct","sixMoPct","oneyPct","fiveyPct","divYield","trailingPE","fwdPE","target","upside"].filter(f=>visibleCols.has(f)).map(field => {
                    const pd = priceData[stock.ticker];
                    const live = livePrice[stock.ticker];
                    // Use live price for current price and daily change
                    let val = pd?.[field];
                    let isLive = false;
                    if (field === "price" && live?.price) { val = live.price; isLive = true; }
                    if (field === "dailyPct" && live?.price && pd?.price) {
                      // Recalc daily change: live price vs Yahoo's previous close
                      const prevClose = pd.price / (1 + (pd.dailyPct||0)/100);
                      val = ((live.price - prevClose) / prevClose) * 100;
                    }
                    const isPrice = field === "price";
                    const isDivYield = field === "divYield";
                    if (isDivYield) val = quoteData[stock.ticker]?.divYield ?? null;
                    const isValCol = ["trailingPE","fwdPE","target","upside"].includes(field);
                    if (field === "trailingPE") val = quoteData[stock.ticker]?.trailingPE ?? null;
                    if (field === "fwdPE") val = quoteData[stock.ticker]?.forwardPE ?? null;
                    if (field === "target") val = quoteData[stock.ticker]?.targetMean ?? null;
                    if (field === "upside") {
                      const tgt = quoteData[stock.ticker]?.targetMean;
                      const curPrice = (livePrice[stock.ticker]?.price) || pd?.price;
                      val = (tgt && curPrice) ? ((tgt - curPrice) / curPrice) * 100 : null;
                    }
                    // Real return adjustment: subtract annualized CPI scaled to timeframe
                    if (realReturns && val != null && !isPrice && !isDivYield && !isValCol && field !== "dailyPct" && macro?.cpiYoY != null) {
                      const cpi = macro.cpiYoY;
                      const scale = {ytdPct: (new Date().getMonth()+1)/12, sixMoPct:0.5, oneyPct:1, fiveyPct:5}[field] || 0;
                      val = val - (cpi * scale);
                    }
                    return (
                      <td key={field} style={{ padding:"10px 14px", textAlign:"right", whiteSpace:"nowrap", fontFamily:S.sans, fontSize:"12px", color: isPrice ? S.txt : isDivYield ? (val>3?S.grn:val>1?S.txt2:S.dim) : isValCol ? (field==="upside" ? pctColor(val) : field==="target" ? S.txt2 : val!=null&&val<15 ? S.grn : val!=null&&val<25 ? S.txt2 : "#f59e0b") : pctColor(val) }}>
                        {pd === undefined && !isDivYield && !isValCol ? <span style={{color:S.dim2,fontSize:"10px"}}>…</span>
                          : val === null || val === undefined ? "—"
                          : isDivYield ? val.toFixed(2)+"%"
                          : field==="trailingPE" ? val.toFixed(1)+"x"
                          : field==="fwdPE" ? val.toFixed(1)+"x"
                          : field==="target" ? "$"+val.toFixed(0)
                          : field==="upside" ? (val>=0?"+":"")+val.toFixed(1)+"%"
                          : isPrice ? (<>
                              {val < 1 ? val.toFixed(4) : val < 100 ? val.toFixed(2) : val.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
                              {isLive && <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:S.grn,marginLeft:5,verticalAlign:"middle"}} title="Live" />}
                            </>)
                          : pctFmt(val)
                        }
                      </td>
                    );
                  })}
                  {/* 5Y sparkline */}
                  {visibleCols.has("spark") && <td style={{ padding:"4px 14px 4px 8px", verticalAlign:"middle" }}>
                    <Spark points={priceData[stock.ticker]?.spark} pct={priceData[stock.ticker]?.fiveyPct} />
                  </td>}
                  {visibleCols.has("tags") && <td style={{ padding:"7px 14px" }}>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:"4px" }}>
                      {stock.tags.map(tag => {
                        const color  = TAG_COLORS[tag] || "#6b7280";
                        const active = activeFilters.has(tag);
                        return (
                          <span
                            key={tag}
                            onClick={e => { e.stopPropagation(); toggleFilter(tag); }}
                            style={{ background: active ? color : `${color}18`, border:`1px solid ${active ? color : color+"45"}`, color: active ? "#fff" : color, padding:"2px 7px", fontSize:"10px", fontFamily:S.sans, cursor:"pointer", transition:"all 0.1s", whiteSpace:"nowrap", }}
                          >{tag}</span>
                        );
                      })}
                    </div>
                  </td>}
                  {visibleCols.has("acct") && <td style={{ padding:"7px 14px", whiteSpace:"nowrap" }}>
                    <span style={{ background:`${acctColor}18`, border:`1px solid ${acctColor}45`, color:acctColor, padding:"2px 8px", fontSize:"10px", fontFamily:S.sans, }}>{acctLabel}</span>
                  </td>}
                </tr>

                {/* ── Drawer ── */}
                {isOpen && (
                  <tr key={`${stock.ticker}-drawer`}>
                    <td colSpan={visibleCols.size} style={{ padding:"0", borderBottom:"1px solid "+S.bg2 }}>
                      <div style={{ background:S.bg2, borderLeft:"2px solid "+S.acc, margin:"0 0 0 44px", padding:"14px 20px 16px" }}>

                        {/* Thesis */}
                        {getTh(_th) ? (
                          <p style={{ fontSize:"12px", color:S.txt2, margin:"0 0 12px", lineHeight:1.6, fontFamily:S.sans }}>
                            <span style={{ color:S.dim, fontSize:"10px", fontWeight:600, letterSpacing:"0.06em", marginRight:"8px" }}>THESIS</span>
                            {getTh(_th)}
                          </p>
                        ) : (
                          <p style={{ fontSize:"12px", color:S.dim2, margin:"0 0 12px", fontStyle:"italic" }}>No thesis recorded yet.</p>
                        )}

                        {/* Valuation Detail (collapsible in drawer) */}
                        {(() => {
                          const qd = quoteData[_th];
                          if (!qd?.trailingPE && !qd?.forwardPE && !qd?.targetMean) return null;
                          return (
                            <div style={{ marginBottom:"12px" }}>
                              <span style={{ color:S.dim, fontSize:"10px", fontWeight:600, letterSpacing:"0.06em" }}>VALUATION</span>
                              <div style={{ display:"flex", gap:"20px", flexWrap:"wrap", marginTop:"6px" }}>
                                {qd.trailingPE!=null && <div><span style={{fontSize:"9px",color:S.dim}}>Trailing P/E</span><div style={{fontSize:"14px",fontWeight:600,color:qd.trailingPE<15?S.grn:qd.trailingPE<25?S.txt2:"#f59e0b",fontFamily:S.sans}}>{qd.trailingPE.toFixed(1)}x</div></div>}
                                {qd.forwardPE!=null && <div><span style={{fontSize:"9px",color:S.dim}}>Forward P/E</span><div style={{fontSize:"14px",fontWeight:600,color:qd.forwardPE<15?S.grn:qd.forwardPE<25?S.txt2:"#f59e0b",fontFamily:S.sans}}>{qd.forwardPE.toFixed(1)}x</div></div>}
                                {(qd.trailingPE&&qd.forwardPE) && <div><span style={{fontSize:"9px",color:S.dim}}>PE Compression</span><div style={{fontSize:"14px",fontWeight:600,color:qd.forwardPE<qd.trailingPE?"#22c55e":"#ef4444",fontFamily:S.sans}}>{((1-qd.forwardPE/qd.trailingPE)*100).toFixed(0)}%</div></div>}
                                {qd.epsTTM!=null && <div><span style={{fontSize:"9px",color:S.dim}}>EPS (TTM)</span><div style={{fontSize:"14px",fontWeight:600,color:S.txt2,fontFamily:S.sans}}>${qd.epsTTM.toFixed(2)}</div></div>}
                                {qd.epsFwd!=null && <div><span style={{fontSize:"9px",color:S.dim}}>EPS (Fwd)</span><div style={{fontSize:"14px",fontWeight:600,color:S.txt2,fontFamily:S.sans}}>${qd.epsFwd.toFixed(2)}</div></div>}
                              </div>
                              {qd.targetMean!=null && (
                                <div style={{ display:"flex", gap:"20px", flexWrap:"wrap", marginTop:"8px" }}>
                                  <div><span style={{fontSize:"9px",color:S.dim}}>Analyst Target</span><div style={{fontSize:"14px",fontWeight:600,color:S.txt2,fontFamily:S.sans}}>${qd.targetMean.toFixed(0)}{qd.analystCount ? <span style={{fontSize:"9px",color:S.dim2,marginLeft:"4px"}}>({qd.analystCount} analysts)</span> : ""}</div></div>
                                  {qd.targetLow!=null && <div><span style={{fontSize:"9px",color:S.dim}}>Low / High</span><div style={{fontSize:"14px",fontWeight:600,color:S.dim,fontFamily:S.sans}}>${qd.targetLow.toFixed(0)} \u2013 ${qd.targetHigh.toFixed(0)}</div></div>}
                                </div>
                              )}
                            </div>
                          );
                        })()}

                        {/* Preferred Account */}
                        <div>
                          <span style={{ fontSize:"10px", color:S.dim, fontWeight:600, letterSpacing:"0.06em", display:"block", marginBottom:"4px" }}>PREFERRED ACCOUNT</span>
                          <span style={{ fontSize:"13px", fontWeight:600, color: ACCT_COLOR[acctKey], fontFamily:S.sans }}>
                            {ACCT[acctKey]}
                          </span>
                        </div>

                      </div>
                    </td>
                  </tr>
                )}
              </>
            );
          })}
          {filtered.length === 0 && (
            <tr><td colSpan={11} style={{ padding:"32px", textAlign:"center", color:S.dim2, fontSize:"13px", fontFamily:S.sans }}>No instruments match current filters</td></tr>
          )}
        </tbody>
      </table>

      <div style={{ borderTop:"1px solid "+S.bdr, marginTop:"28px", paddingTop:"12px", fontSize:"10px", color:S.dim2, display:"flex", justifyContent:"space-between", fontFamily:S.sans }}>
        <span>Weathervane — All-Weather Portfolio Watchlist</span>
        <span>{new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StockTracker />);
  </script>
</body>
</html>
